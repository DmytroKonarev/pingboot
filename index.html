<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ping Boot</title>
<script src="https://telegram.org/js/games.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; background:#1a1230; overflow:hidden;
    font-family:system-ui,sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { background:linear-gradient(#241a44,#140d28); display:block; box-shadow:0 0 40px #000 inset; }
  #hud { position:fixed; top:10px; left:0; right:0; text-align:center; color:#ffd54a;
    font-size:20px; font-weight:700; text-shadow:0 2px 4px #000; pointer-events:none; }
  #overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; color:#fff; text-align:center; background:rgba(15,10,32,.85); }
  #overlay h1 { color:#ffd54a; margin:0 0 8px; font-size:30px; }
  #overlay p { margin:6px 0; opacity:.9; }
  #overlay button { margin-top:18px; padding:14px 34px; font-size:20px; font-weight:700;
    border:none; border-radius:12px; background:#ffd54a; color:#2a1c4a; cursor:pointer; }
  .hidden { display:none !important; }
  #board { margin-top:16px; width:min(88vw,340px); max-height:46vh; overflow-y:auto;
    background:rgba(0,0,0,.25); border-radius:12px; padding:10px 12px; }
  .board-title { color:#ffd54a; font-weight:800; font-size:18px; margin-bottom:8px; text-align:center; }
  .board-row { display:flex; align-items:center; gap:8px; padding:5px 6px; border-radius:8px; font-size:15px; }
  .board-row:nth-child(even) { background:rgba(255,255,255,.05); }
  .board-row.me { background:rgba(255,213,74,.22); font-weight:700; }
  .board-row .rank { width:28px; color:#ffd54a; text-align:right; }
  .board-row .nm { flex:1; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .board-row .sc { font-variant-numeric:tabular-nums; color:#ffd54a; }
  #flash { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:#ffd54a; font-size:34px; font-weight:800; text-shadow:0 3px 8px #000; pointer-events:none;
    opacity:0; transition:opacity .25s; }
  #pauseBtn { position:fixed; top:8px; right:10px; z-index:5; width:40px; height:40px;
    border:none; border-radius:10px; background:rgba(0,0,0,.35); color:#ffd54a;
    font-size:18px; font-weight:800; cursor:pointer; display:none; align-items:center; justify-content:center; }
  #pauseBtn.show { display:flex; }
  #pauseOverlay { position:fixed; inset:0; z-index:6; display:none; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(15,10,32,.8); color:#fff; text-align:center; }
  #pauseOverlay.show { display:flex; }
  #pauseOverlay h1 { color:#ffd54a; font-size:30px; margin:0 0 4px; }
  #pauseOverlay p { opacity:.8; margin:4px 0 0; font-size:14px; }
  #pauseOverlay button { margin-top:20px; padding:14px 34px; font-size:20px; font-weight:700;
    border:none; border-radius:12px; background:#ffd54a; color:#2a1c4a; cursor:pointer; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud"></div>
<div id="flash"></div>
<button id="pauseBtn" aria-label="Пауза">II</button>
<div id="pauseOverlay">
  <h1>Пауза</h1>
  <p>Гру призупинено</p>
  <button id="resumeBtn">Продовжити</button>
</div>
<div id="overlay">
  <h1>Ping Boot</h1>
  <p>Розбий усі блоки ботинком.</p>
  <p>Зачистив рівень — з'явиться новий візерунок.</p>
  <p>Кожен дотик до ракетки прискорює гру.</p>
  <button id="startBtn">Грати</button>
</div>
<script>
"use strict";
// params passed by the bot via the Play button URL
const P=new URLSearchParams(location.search);
const REPORT={uid:P.get("uid"),name:P.get("name"),cid:P.get("cid"),mid:P.get("mid"),iid:P.get("iid"),ep:P.get("ep"),top:P.get("top")};
const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
const hud=document.getElementById("hud"),overlay=document.getElementById("overlay"),startBtn=document.getElementById("startBtn"),flash=document.getElementById("flash");
const pauseBtn=document.getElementById("pauseBtn"),pauseOverlay=document.getElementById("pauseOverlay"),resumeBtn=document.getElementById("resumeBtn");

let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=Math.min(window.innerWidth,520);H=window.innerHeight;
 canvas.style.width=W+"px";canvas.style.height=H+"px";canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener("resize",()=>{const wasRunning=running;resize();if(bricks&&bricks.length)layoutInfo&&rebuildPositions();});
resize();

let running=false,score=0,level=1,paddle,boot,particles,bricks,layoutInfo;
let paused=false;       // true while the game is paused
let pauseRemain=null;   // {wide, slow, countdown} ms remaining, captured at pause
let countdown=0;        // seconds remaining shown before a level starts (0 = playing)
let countdownUntil=0;   // timestamp when countdown ends

// multi-boot support: `boots` is the source of truth; `boot` mirrors the first
// active boot only for legacy references that still read a single boot.
let boots=[];

// falling power-ups the player can catch with the paddle
let powerups=[];
let dropsThisLevel=0;      // how many power-ups already dropped this level
let dropQuota=0;           // how many are PLANNED to drop this level (random 0..2)
let dropThresholds=[];     // progress points (0..1) at which planned drops trigger
let bricksAtLevelStart=0;  // to schedule drops across the level

// timed effects
let paddleBaseW=110;       // normal paddle width
let widePaddleUntil=0;     // timestamp; while > now, paddle is widened
let slowUntil=0;           // timestamp; while > now, time is slowed
const SLOW_FACTOR=0.5;     // boots move at 50% speed during slow-mo

// power-up types
const POW_TYPES=["multiball","widepaddle","slowmo"];
const POW_STYLE={
  multiball:  {color:"#ffd54a", ring:"#a8791f", label:"+1"},
  widepaddle: {color:"#5ad1ff", ring:"#2f7fa0", label:"W"},
  slowmo:     {color:"#b58cff", ring:"#6a4fb0", label:"S"}
};

// ---- colors per shape ----
const SHAPE_COLORS={
  rect:    {base:"#e05a5a", light:"#ff8a8a", dark:"#a83636"},
  diamond: {base:"#5ac8e0", light:"#8ee6f5", dark:"#3488a0"},
  triangle:{base:"#9ae05a", light:"#c4f58e", dark:"#6aa838"},
  hex:     {base:"#e0a55a", light:"#f5cd8e", dark:"#a87538"},
  circle:  {base:"#c95ae0", light:"#e68ef5", dark:"#8f38a8"}
};
const SHAPES=["rect","diamond","triangle","hex","circle"];

// ---- brick grid config ----
function gridConfig(){
  const cols=7;
  const margin=14;
  const gap=6;
  const cw=(W-margin*2-gap*(cols-1))/cols;
  const ch=Math.min(26, cw*0.55);
  const top=70;
  return {cols,margin,gap,cw,ch,top};
}

// Procedural "ornament": decide which cells are filled, symmetric pattern.
function buildLevel(lvl){
  const g=gridConfig();
  const rows=Math.min(4+Math.floor(lvl/2),8);
  bricks=[];
  layoutInfo={g,rows};
  const half=Math.ceil(g.cols/2);
  // generate a symmetric mask
  const seed=lvl*97+13;
  function rnd(n){ // deterministic-ish per level+n
    let x=Math.sin(seed+n*12.9898)*43758.5453; return x-Math.floor(x);
  }
  for(let r=0;r<rows;r++){
    for(let c=0;c<half;c++){
      const idx=r*half+c;
      // pattern rules make ornaments: fill based on distance/parity
      let fill;
      const patt=lvl%4;
      if(patt===0) fill = rnd(idx)>0.35;                 // scattered
      else if(patt===1) fill = ((r+c)%2===0) || rnd(idx)>0.7; // checker + noise
      else if(patt===2) fill = (c<=r) ;                  // triangle build
      else fill = (r===0||r===rows-1||c===0) || rnd(idx)>0.6; // frame
      if(!fill) continue;
      const shape=SHAPES[(r+c+lvl)%SHAPES.length];
      const hits=1+ (rnd(idx*3)>0.8 ? 1:0) + Math.floor(lvl/5); // tougher later
      addBrick(g,r,c,shape,hits);
      // mirror
      const mc=g.cols-1-c;
      if(mc!==c) addBrick(g,r,mc,shape,hits);
    }
  }
}

function addBrick(g,r,c,shape,hits){
  const x=g.margin + c*(g.cw+g.gap);
  const y=g.top + r*(g.ch+g.gap);
  bricks.push({x,y,w:g.cw,h:g.ch,shape,hits,maxHits:hits,alive:true,r,c});
}

function rebuildPositions(){
  const g=gridConfig();
  for(const b of bricks){ b.x=g.margin+b.c*(g.cw+g.gap); b.y=g.top+b.r*(g.ch+g.gap); b.w=g.cw; b.h=g.ch; }
  layoutInfo.g=g;
}

function reset(){
  score=0;level=1;
  countdown=0;countdownUntil=0;
  paddleBaseW=110;
  widePaddleUntil=0;slowUntil=0;
  paddle={w:paddleBaseW,h:16,x:W/2-paddleBaseW/2,y:H-60};
  boots=[];powerups=[];dropsThisLevel=0;
  spawnBoot();
  particles=[];
  buildLevel(level);
  bricksAtLevelStart=aliveCount();
  planLevelDrops();
}
function makeBoot(speed,x,y){
  const sp = speed!=null ? speed : (3.0 + (level-1)*0.4);
  return {x:(x!=null?x:W/2), y:(y!=null?y:H-120), r:18,
    vx:(Math.random()*2-1)*2, vy:-sp, speed:sp, angle:0, spin:0.05};
}
// spawn a fresh single boot (used at level start). keepSpeed carries momentum.
function spawnBoot(keepSpeed){
  boots=[makeBoot(keepSpeed)];
  boot=boots[0];
}

function spawnParticles(x,y,color){
  for(let i=0;i<14;i++)particles.push({x,y,vx:(Math.random()*2-1)*5,vy:(Math.random()*2-1)*5,life:1,color});
}

function moveTo(clientX){const rect=canvas.getBoundingClientRect();const x=clientX-rect.left;paddle.x=Math.max(0,Math.min(W-paddle.w,x-paddle.w/2));}
canvas.addEventListener("mousemove",e=>{if(running&&!paused)moveTo(e.clientX);});
canvas.addEventListener("touchmove",e=>{if(running&&!paused&&e.touches[0]){moveTo(e.touches[0].clientX);e.preventDefault();}},{passive:false});

function drawBoot(b){
  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.rotate(b.angle);
  const s=0.95;

  // soft drop shadow
  ctx.save();
  ctx.globalAlpha=0.25;
  ctx.fillStyle="#000";
  ctx.beginPath();ctx.ellipse(2*s,20*s,20*s,6*s,0,0,7);ctx.fill();
  ctx.restore();

  // main leather body with vertical gradient
  const grad=ctx.createLinearGradient(0,-22*s,0,18*s);
  grad.addColorStop(0,"#b07636");
  grad.addColorStop(0.5,"#8a5a2b");
  grad.addColorStop(1,"#5f3c1b");
  ctx.fillStyle=grad;
  ctx.strokeStyle="#3d2712";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-14*s,-20*s);
  ctx.lineTo(4*s,-20*s);
  ctx.quadraticCurveTo(8*s,-20*s,8*s,-14*s);
  ctx.lineTo(8*s,2*s);
  ctx.lineTo(20*s,3*s);
  ctx.quadraticCurveTo(27*s,4*s,27*s,11*s);
  ctx.lineTo(27*s,15*s);
  ctx.lineTo(-14*s,15*s);
  ctx.closePath();
  ctx.fill();ctx.stroke();

  // toe cap highlight
  ctx.fillStyle="rgba(255,220,150,.25)";
  ctx.beginPath();
  ctx.moveTo(14*s,5*s);ctx.quadraticCurveTo(26*s,5*s,25*s,11*s);
  ctx.lineTo(16*s,11*s);ctx.closePath();ctx.fill();

  // ankle opening (inner shadow)
  ctx.fillStyle="#2c1c0e";
  ctx.beginPath();ctx.ellipse(-4*s,-19*s,9*s,3.2*s,0,0,7);ctx.fill();

  // laces
  ctx.strokeStyle="#f0e2c0";ctx.lineWidth=1.6*s;
  for(let i=0;i<4;i++){
    const ly=-14*s+i*4.2*s;
    ctx.beginPath();ctx.moveTo(-11*s,ly);ctx.lineTo(5*s,ly-2*s);ctx.stroke();
  }
  // lace eyelets
  ctx.fillStyle="#ffd54a";
  for(let i=0;i<4;i++){
    const ly=-14*s+i*4.2*s;
    ctx.beginPath();ctx.arc(-11*s,ly,1.3*s,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(5*s,ly-2*s,1.3*s,0,7);ctx.fill();
  }

  // stitching along the top of the sole
  ctx.strokeStyle="rgba(255,235,190,.5)";
  ctx.lineWidth=1;ctx.setLineDash([3*s,2*s]);
  ctx.beginPath();ctx.moveTo(-13*s,12*s);ctx.lineTo(25*s,12*s);ctx.stroke();
  ctx.setLineDash([]);

  // sole with tread
  ctx.fillStyle="#241611";
  ctx.beginPath();rr(-15*s,14*s,44*s,6*s,2);ctx.fill();
  // heel
  ctx.fillStyle="#1a0f0a";
  ctx.beginPath();rr(-15*s,14*s,8*s,9*s,2);ctx.fill();
  // tread notches
  ctx.fillStyle="#3a2418";
  for(let i=0;i<7;i++){ctx.fillRect((-6+i*5)*s,17*s,2*s,3*s);}

  ctx.restore();
}

function brickColor(b){
  return SHAPE_COLORS[b.shape].base;
}

// build a path for the given brick shape (no fill/stroke here)
function brickPath(b){
  const cx=b.x+b.w/2, cy=b.y+b.h/2;
  ctx.beginPath();
  if(b.shape==="rect"){
    rr(b.x,b.y,b.w,b.h,6);
  }else if(b.shape==="diamond"){
    ctx.moveTo(cx,b.y);ctx.lineTo(b.x+b.w,cy);ctx.lineTo(cx,b.y+b.h);ctx.lineTo(b.x,cy);ctx.closePath();
  }else if(b.shape==="triangle"){
    ctx.moveTo(cx,b.y+2);ctx.lineTo(b.x+b.w-2,b.y+b.h);ctx.lineTo(b.x+2,b.y+b.h);ctx.closePath();
  }else if(b.shape==="hex"){
    const w=b.w,h=b.h,q=w*0.25;
    ctx.moveTo(b.x+q,b.y);ctx.lineTo(b.x+w-q,b.y);ctx.lineTo(b.x+w,cy);
    ctx.lineTo(b.x+w-q,b.y+h);ctx.lineTo(b.x+q,b.y+h);ctx.lineTo(b.x,cy);ctx.closePath();
  }else{ // circle
    ctx.arc(cx,cy,Math.min(b.w,b.h)/2-1,0,Math.PI*2);
  }
}

function drawBrick(b){
  if(!b.alive)return;
  const c=SHAPE_COLORS[b.shape];
  const cx=b.x+b.w/2, cy=b.y+b.h/2;

  // drop shadow
  ctx.save();
  ctx.globalAlpha=0.28;
  ctx.fillStyle="#000";
  ctx.translate(0,2.5);
  brickPath(b);ctx.fill();
  ctx.restore();

  // body gradient (top light -> bottom dark)
  const g=ctx.createLinearGradient(0,b.y,0,b.y+b.h);
  g.addColorStop(0,c.light);
  g.addColorStop(0.5,c.base);
  g.addColorStop(1,c.dark);
  ctx.fillStyle=g;
  brickPath(b);ctx.fill();

  // glossy top-half highlight, clipped to the shape
  ctx.save();
  brickPath(b);ctx.clip();
  const gl=ctx.createLinearGradient(0,b.y,0,cy);
  gl.addColorStop(0,"rgba(255,255,255,.45)");
  gl.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=gl;
  ctx.fillRect(b.x,b.y,b.w,b.h*0.55);
  ctx.restore();

  // crisp border
  ctx.lineWidth=1.5;
  ctx.strokeStyle="rgba(0,0,0,.4)";
  brickPath(b);ctx.stroke();
  // inner light edge
  ctx.lineWidth=1;
  ctx.strokeStyle="rgba(255,255,255,.25)";
  ctx.save();brickPath(b);ctx.clip();
  brickPath(b);ctx.stroke();ctx.restore();

  // durability: tough bricks (>1 hit) get metal rivets in corners
  if(b.hits>1){
    ctx.fillStyle="rgba(255,255,255,.55)";
    const rv=1.7;
    const pad=5;
    [[b.x+pad,b.y+pad],[b.x+b.w-pad,b.y+pad],
     [b.x+pad,b.y+b.h-pad],[b.x+b.w-pad,b.y+b.h-pad]].forEach(p=>{
      ctx.beginPath();ctx.arc(p[0],p[1],rv,0,7);ctx.fill();
    });
  }
  // already-damaged brick (took a hit but not dead): show a crack
  if(b.hits>0 && b.hits<b.maxHits){
    ctx.strokeStyle="rgba(0,0,0,.5)";ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(cx-b.w*0.2,b.y+3);
    ctx.lineTo(cx-2,cy);ctx.lineTo(cx+3,cy+2);
    ctx.lineTo(cx-b.w*0.1,b.y+b.h-3);
    ctx.stroke();
  }
}
function rr(x,y,w,h,r){ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);}

function hitBrick(b){
  b.hits--;
  spawnParticles(b.x+b.w/2,b.y+b.h/2,brickColor(b));
  if(b.hits<=0){
    b.alive=false;score+=10;
    maybeDropPowerup(b.x+b.w/2, b.y+b.h/2);
  } else {
    score+=3;
  }
}

// At the start of each level, randomly decide how many power-ups this level
// will yield (0, 1 or 2) and at what progress points they trigger.
// From level 2 only. Distribution is weighted so 0/1/2 all happen.
function planLevelDrops(){
  dropsThisLevel=0;
  dropThresholds=[];
  dropQuota=0;
  if(level<2) return;
  // roll the count: ~30% none, ~45% one, ~25% two
  const r=Math.random();
  if(r<0.30) dropQuota=0;
  else if(r<0.75) dropQuota=1;
  else dropQuota=2;
  // pick random progress points for each planned drop, kept apart a bit
  for(let i=0;i<dropQuota;i++){
    // spread across the level: 0.2..0.85, with some randomness
    const base = dropQuota===2 ? (i===0?0.25:0.65) : 0.4;
    const jitter = (Math.random()*2-1)*0.15;
    dropThresholds.push(Math.min(0.9, Math.max(0.1, base+jitter)));
  }
  dropThresholds.sort((a,b)=>a-b);
}

// Called when a brick is destroyed. Releases a planned drop once the level
// progress crosses the next scheduled threshold.
function maybeDropPowerup(x,y){
  if(dropsThisLevel>=dropQuota) return;
  const destroyed = bricksAtLevelStart - aliveCount();
  const total = Math.max(1,bricksAtLevelStart);
  const progress = destroyed/total;
  const nextThreshold = dropThresholds[dropsThisLevel];
  if(nextThreshold!=null && progress>=nextThreshold){
    spawnPowerup(x,y);
  }
}

function spawnPowerup(x,y){
  if(dropsThisLevel>=dropQuota) return;
  dropsThisLevel++;
  const type=POW_TYPES[Math.floor(Math.random()*POW_TYPES.length)];
  // movement style: some fall straight, some drift/zigzag unpredictably
  const wobble = Math.random()<0.5;
  powerups.push({
    x, y, r:13, type,
    vy: 2.2 + Math.random()*0.6,
    vx: wobble ? (Math.random()*2-1)*1.5 : 0,
    wobble,
    phase: Math.random()*Math.PI*2,
    spin: 0
  });
}

function applyPowerup(type){
  const now=performance.now();
  if(type==="multiball"){
    // add a boot cloned from the fastest active boot, sent upward
    const src = boots.length ? boots.reduce((a,b)=>a.speed>b.speed?a:b) : null;
    const sp = src ? src.speed : (3.0+(level-1)*0.4);
    const nb = makeBoot(sp, paddle.x+paddle.w/2, paddle.y-30);
    nb.vy = -Math.abs(sp);
    nb.vx = (Math.random()*2-1)*2;
    boots.push(nb);
  } else if(type==="widepaddle"){
    widePaddleUntil = now + 10000; // 10 seconds
  } else if(type==="slowmo"){
    slowUntil = now + 10000; // 10 seconds
  }
  // catch sparkle
  const st=POW_STYLE[type];
  for(let i=0;i<18;i++)particles.push({x:paddle.x+paddle.w/2,y:paddle.y,
    vx:(Math.random()*2-1)*5,vy:(Math.random()*2-1)*5,life:1,color:st.color});
}

// advance and collide power-ups; returns nothing, mutates powerups
function updatePowerups(dt){
  for(const p of powerups){
    p.phase += 0.12;
    if(p.wobble){
      // unpredictable side-to-side drift
      p.x += p.vx + Math.sin(p.phase)*1.6;
      // occasionally flip drift direction
      if(Math.random()<0.02) p.vx*=-1;
    } else {
      p.x += p.vx;
    }
    p.y += p.vy;
    p.spin += 0.08;
    // bounce off side walls softly
    if(p.x<p.r){p.x=p.r;p.vx=Math.abs(p.vx);}
    if(p.x>W-p.r){p.x=W-p.r;p.vx=-Math.abs(p.vx);}
    // caught by paddle?
    if(p.y+p.r>=paddle.y && p.y-p.r<=paddle.y+paddle.h &&
       p.x>=paddle.x-p.r && p.x<=paddle.x+paddle.w+p.r){
      p.caught=true;
      applyPowerup(p.type);
    }
  }
  // keep only those still on screen and not caught
  powerups = powerups.filter(p=>!p.caught && p.y-p.r<=H);
}

function drawPowerup(p){
  const st=POW_STYLE[p.type];
  ctx.save();
  ctx.translate(p.x,p.y);
  // glow
  ctx.globalAlpha=0.35;
  ctx.fillStyle=st.color;
  ctx.beginPath();ctx.arc(0,0,p.r+5,0,7);ctx.fill();
  ctx.globalAlpha=1;
  // capsule body
  ctx.rotate(Math.sin(p.spin)*0.15);
  const g=ctx.createLinearGradient(0,-p.r,0,p.r);
  g.addColorStop(0,"#ffffff");g.addColorStop(0.35,st.color);g.addColorStop(1,st.ring);
  ctx.fillStyle=g;ctx.strokeStyle=st.ring;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,p.r,0,7);ctx.fill();ctx.stroke();
  // label
  ctx.fillStyle="#20143a";ctx.font="700 12px system-ui,sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(st.label,0,1);
  ctx.restore();
}

function aliveCount(){return bricks.filter(b=>b.alive).length;}

function nextLevel(keepSpeed){
  level++;
  buildLevel(level);
  bricksAtLevelStart=aliveCount();
  dropsThisLevel=0;
  planLevelDrops();
  powerups=[];               // clear uncaught drops
  widePaddleUntil=0;slowUntil=0; // effects don't carry across levels
  paddle.w=paddleBaseW;paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
  // new level starts at 75% of the speed carried from the previous level
  const carried = keepSpeed!=null ? keepSpeed*0.75 : null;
  spawnBoot(carried);
  startCountdown(3); // 3s prep countdown over the new level
}

function showFlash(txt){
  flash.textContent=txt;flash.style.opacity="1";
  setTimeout(()=>{flash.style.opacity="0";},900);
}

function startCountdown(sec){
  countdown=sec;
  countdownUntil=performance.now()+sec*1000;
}

function step(){
  if(!running)return;
  if(paused){ render(); drawPauseHint(); return; } // frozen; loop resumes on resumeGame()
  const now=performance.now();

  // level-start countdown: freeze play, let the player get ready
  if(countdown>0){
    const remainMs=countdownUntil-now;
    const shown=Math.max(1,Math.ceil(remainMs/1000));
    if(remainMs<=0){
      countdown=0; // go
    }else{
      render();
      drawCountdown(shown);
      requestAnimationFrame(step);
      return;
    }
  }

  // timed paddle width
  const wide = now < widePaddleUntil;
  const targetW = wide ? paddleBaseW*1.25 : paddleBaseW;
  if(paddle.w!==targetW){
    const cx=paddle.x+paddle.w/2;
    paddle.w=targetW;
    paddle.x=Math.max(0,Math.min(W-paddle.w,cx-paddle.w/2));
  }

  // time scale (slow-mo affects boot movement only)
  const scale = (now < slowUntil) ? SLOW_FACTOR : 1;

  // ---- move & collide every active boot ----
  for(const bt of boots){
    bt.x+=bt.vx*scale; bt.y+=bt.vy*scale; bt.angle+=bt.spin*scale;

    if(bt.x<bt.r){bt.x=bt.r;bt.vx*=-1;}
    if(bt.x>W-bt.r){bt.x=W-bt.r;bt.vx*=-1;}

    // top edge: this boot exits -> level up (carry this boot's speed)
    if(bt.y+bt.r<0){
      spawnParticles(bt.x,0,"#ffd54a");
      score+=25;
      nextLevel(bt.speed);
      requestAnimationFrame(step);
      return;
    }

    // paddle collision
    if(bt.vy>0 && bt.y+bt.r>=paddle.y && bt.y+bt.r<=paddle.y+paddle.h+14 &&
       bt.x>=paddle.x-bt.r && bt.x<=paddle.x+paddle.w+bt.r){
      const hit=(bt.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      bt.speed+=0.125;
      const ang=hit*1.05;
      bt.vx=bt.speed*Math.sin(ang)+hit*1.5;
      bt.vy=-Math.abs(bt.speed*Math.cos(ang));
      if(Math.abs(bt.vy)<1.5) bt.vy=-1.5;
      bt.y=paddle.y-bt.r-1;
      spawnParticles(bt.x,bt.y,"#ffd54a");
    }

    // brick collision (one brick per boot per frame)
    for(const b of bricks){
      if(!b.alive)continue;
      if(bt.x+bt.r>b.x && bt.x-bt.r<b.x+b.w &&
         bt.y+bt.r>b.y && bt.y-bt.r<b.y+b.h){
        const prevX=bt.x-bt.vx;
        const fromSide = prevX+bt.r<=b.x || prevX-bt.r>=b.x+b.w;
        if(fromSide) bt.vx*=-1; else bt.vy*=-1;
        hitBrick(b);
        break;
      }
    }
  }

  // remove boots that fell below the screen
  boots = boots.filter(bt=>bt.y-bt.r<=H);
  boot = boots[0] || boot; // keep legacy mirror pointing at an active boot

  // all boots lost -> game over
  if(boots.length===0){ gameOver(); return; }

  // level cleared -> next level (carry fastest boot's speed)
  if(aliveCount()===0){
    const fastest=boots.reduce((a,b)=>a.speed>b.speed?a:b);
    nextLevel(fastest.speed);
    requestAnimationFrame(step);
    return;
  }

  // power-ups fall & get caught
  updatePowerups();

  // particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=0.04;}
  particles=particles.filter(p=>p.life>0);

  render();
  requestAnimationFrame(step);
}

function drawCountdown(n){
  // dim veil so bricks stay visible but the number pops
  ctx.save();
  ctx.fillStyle="rgba(10,6,22,.45)";
  ctx.fillRect(0,0,W,H);
  // pulsing scale within each second
  const frac=1-((countdownUntil-performance.now())/1000)%1; // 0..1 inside the second
  const scale=1+0.25*(1-frac);
  const cx=W/2, cy=H*0.42;
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.font="700 20px system-ui,sans-serif";
  ctx.fillStyle="rgba(255,213,74,.85)";
  ctx.fillText("Приготуйся",cx,cy-70);
  ctx.save();
  ctx.translate(cx,cy);ctx.scale(scale,scale);
  ctx.font="800 96px system-ui,sans-serif";
  ctx.lineWidth=6;ctx.strokeStyle="rgba(0,0,0,.5)";
  ctx.strokeText(n,0,0);
  ctx.fillStyle="#ffd54a";
  ctx.fillText(n,0,0);
  ctx.restore();
  ctx.font="600 16px system-ui,sans-serif";
  ctx.fillStyle="rgba(255,255,255,.7)";
  ctx.fillText("Рівень "+level,cx,cy+80);
  ctx.restore();
}

function drawPauseHint(){
  // subtle veil on the canvas; the HTML pause overlay sits on top
  ctx.save();
  ctx.fillStyle="rgba(10,6,22,.35)";
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);
  for(const b of bricks) drawBrick(b);

  // paddle: shadow + gradient body + top gloss
  ctx.save();
  ctx.globalAlpha=0.3;ctx.fillStyle="#000";
  ctx.beginPath();rr(paddle.x,paddle.y+3,paddle.w,paddle.h,9);ctx.fill();
  ctx.restore();
  const pg=ctx.createLinearGradient(0,paddle.y,0,paddle.y+paddle.h);
  pg.addColorStop(0,"#ffe98a");pg.addColorStop(0.5,"#ffd54a");pg.addColorStop(1,"#d19a1f");
  ctx.fillStyle=pg;
  ctx.beginPath();rr(paddle.x,paddle.y,paddle.w,paddle.h,9);ctx.fill();
  ctx.strokeStyle="rgba(120,80,10,.6)";ctx.lineWidth=1.5;
  ctx.beginPath();rr(paddle.x,paddle.y,paddle.w,paddle.h,9);ctx.stroke();
  ctx.fillStyle="rgba(255,255,255,.4)";
  ctx.beginPath();rr(paddle.x+4,paddle.y+2,paddle.w-8,paddle.h*0.38,5);ctx.fill();
  // grip marks
  ctx.strokeStyle="rgba(120,80,10,.4)";ctx.lineWidth=1.5;
  for(let i=-1;i<=1;i++){const gx=paddle.x+paddle.w/2+i*10;
    ctx.beginPath();ctx.moveTo(gx,paddle.y+4);ctx.lineTo(gx,paddle.y+paddle.h-4);ctx.stroke();}

  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color||"#ffcf5a";ctx.fillRect(p.x,p.y,4,4);}
  ctx.globalAlpha=1;

  // falling power-ups
  for(const p of powerups) drawPowerup(p);

  // all active boots
  for(const bt of boots) drawBoot(bt);

  // active-effect indicators (top-right)
  const now=performance.now();
  const badges=[];
  if(now<widePaddleUntil) badges.push({t:"Широка ракетка", ms:widePaddleUntil-now, c:"#5ad1ff"});
  if(now<slowUntil) badges.push({t:"Уповільнення", ms:slowUntil-now, c:"#b58cff"});
  if(boots.length>1) badges.push({t:"Ботинки: "+boots.length, ms:null, c:"#ffd54a"});
  ctx.textAlign="right";ctx.textBaseline="top";ctx.font="600 13px system-ui,sans-serif";
  badges.forEach((bd,i)=>{
    const secs = bd.ms!=null ? " "+Math.ceil(bd.ms/1000)+"с" : "";
    ctx.fillStyle=bd.c;
    ctx.fillText(bd.t+secs, W-10, 40+i*18);
  });

  hud.textContent="Рівень "+level+"   Бали: "+score;
}

function startGame(){
  reset();
  overlay.classList.add("hidden");
  pauseOverlay.classList.remove("show");
  pauseBtn.classList.add("show");
  paused=false;pauseRemain=null;
  running=true;
  requestAnimationFrame(step);
}

function pauseGame(){
  if(!running || paused) return;
  paused=true;
  const now=performance.now();
  // freeze timed effects by remembering how much time was left
  pauseRemain={
    wide: widePaddleUntil>now ? widePaddleUntil-now : 0,
    slow: slowUntil>now ? slowUntil-now : 0,
    countdown: (countdown>0 && countdownUntil>now) ? countdownUntil-now : 0
  };
  pauseOverlay.classList.add("show");
}

function resumeGame(){
  if(!running || !paused) return;
  const now=performance.now();
  // restore timed effects relative to the new clock
  if(pauseRemain){
    widePaddleUntil = pauseRemain.wide>0 ? now+pauseRemain.wide : 0;
    slowUntil       = pauseRemain.slow>0 ? now+pauseRemain.slow : 0;
    if(pauseRemain.countdown>0){ countdownUntil = now+pauseRemain.countdown; }
  }
  pauseRemain=null;
  paused=false;
  pauseOverlay.classList.remove("show");
  requestAnimationFrame(step);
}

function togglePause(){ paused?resumeGame():pauseGame(); }

pauseBtn.addEventListener("click",togglePause);
resumeBtn.addEventListener("click",resumeGame);
window.addEventListener("keydown",e=>{
  if((e.key==="p"||e.key==="P"||e.key==="Escape"||e.key===" ") && running){
    e.preventDefault();togglePause();
  }
});
async function gameOver(){running=false;
  paused=false;pauseRemain=null;
  pauseBtn.classList.remove("show");
  pauseOverlay.classList.remove("show");
  overlay.querySelector("h1").textContent="Гру завершено";
  overlay.querySelectorAll("p").forEach(p=>p.remove());
  const old=document.getElementById("board");if(old)old.remove();
  const a=document.createElement("p");a.textContent="Рівень: "+level;
  const b=document.createElement("p");b.textContent="Твій рахунок: "+score;
  overlay.insertBefore(a,startBtn);overlay.insertBefore(b,startBtn);
  startBtn.textContent="Ще раз";overlay.classList.remove("hidden");

  // 1) send score, wait so the DB updates before we read the top
  if(REPORT.ep&&REPORT.uid&&score>0){
    try{
      await fetch(REPORT.ep,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({uid:REPORT.uid,name:REPORT.name,score:score,
          cid:REPORT.cid,mid:REPORT.mid,iid:REPORT.iid})});
    }catch(e){}
  }

  // 2) fetch and render the leaderboard for this chat
  if(REPORT.top&&(REPORT.cid||REPORT.iid)){
    try{
      const qs=new URLSearchParams();
      if(REPORT.cid)qs.set("cid",REPORT.cid); else qs.set("iid",REPORT.iid);
      const res=await fetch(REPORT.top+"?"+qs.toString());
      const data=await res.json();
      if(data&&data.ok&&data.top&&data.top.length){
        const box=document.createElement("div");box.id="board";
        const h=document.createElement("div");h.className="board-title";h.textContent="Таблиця лідерів";
        box.appendChild(h);
        data.top.forEach((row,i)=>{
          const line=document.createElement("div");line.className="board-row";
          const rank=document.createElement("span");rank.className="rank";rank.textContent=(i+1)+".";
          const nm=document.createElement("span");nm.className="nm";nm.textContent=row.name;
          const sc=document.createElement("span");sc.className="sc";sc.textContent=row.score;
          if(String(row.name)===String(REPORT.name))line.classList.add("me");
          line.appendChild(rank);line.appendChild(nm);line.appendChild(sc);
          box.appendChild(line);
        });
        overlay.insertBefore(box,startBtn);
      }
    }catch(e){}
  }
}
startBtn.addEventListener("click",startGame);

// initial idle render
paddle={w:paddleBaseW,h:16,x:W/2-paddleBaseW/2,y:H-60};
boot={x:W/2,y:H-120,r:18,vx:0,vy:0,angle:0,spin:0};
boots=[boot];particles=[];bricks=[];powerups=[];
render();
</script>
</body>
